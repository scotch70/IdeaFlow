<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark navy background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#13162a"/>

  <!-- Flow connector — subtle bezier linking all three nodes -->
  <path
    d="M 22 78 C 38 62 62 38 78 22"
    stroke="#f97316"
    stroke-opacity="0.18"
    stroke-width="6"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Node A — bottom-left: entry point (employee ideas) -->
  <circle cx="22" cy="78" r="9"  fill="#f97316" fill-opacity="0.28"/>

  <!-- Node B — center: aggregation layer -->
  <circle cx="50" cy="50" r="12" fill="#f97316" fill-opacity="0.62"/>

  <!-- Node C — top-right: focused leadership insight -->
  <circle cx="78" cy="22" r="15" fill="#f97316"/>
</svg>
